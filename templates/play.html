{% extends "base.html" %}
{% load json_filter %}

{% block content %}

<div class="container-fluid d-flex flex-column vh-100">

    <div class="row justify-content-between p-3 titre">

        <h1>{{ surface.name }}</h1>

        <h1>

            <div id="spinner" class="spinner-border" style="visibility:hidden"></div>

            <a id="download-button" class="glyph" style="visibility:hidden">
                <span class="fa-regular fa-circle-down"></span>
            </a>

            <a href="{% url 'surface-update' pk=surface.pk %}" class="glyph">
                <span class="far fa-pen-to-square"></span>
            </a>

            <a href="{% url 'surfaces' %}" class="glyph">
                <span class="fa-regular fa-rectangle-list"></span>
            </a>

        </h1>

    </div>


    <div class="row flex-grow-1 position-relative">

        <svg id="svgbox" viewBox="-1 -1 2 2" preserveAspectRatio="xMidYMid meet" class="position-absolute w-100 h-100" style="overflow: visible">

            <g id="svg" transform="translate(0 0) scale(1 1)" style="pointer-events:none"></g>

        </svg>

        <canvas id="canvas" class="position-absolute w-100 h-100"></canvas>

    </div>

</div>



<script type="module">

    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.121.1/build/three.module.js';
    import { TrackballControls } from 'https://cdn.jsdelivr.net/npm/three@0.121.1/examples/jsm/controls/TrackballControls.js';



    /* ---------------- DATA ---------------- */

    const radius = {{ radius }};
    const center = {{ center | tojson }};
    const pk = {{ pk }};

    const positions = {{ positions | tojson }};
    const normals = {{ normals | tojson }};
    const faces = {{ faces | tojson }};



    /* ---------------- DOM ---------------- */

    const canvas = document.getElementById("canvas");
    const svg = document.getElementById("svg");

    const spinner = document.getElementById("spinner");
    const downloadButton = document.getElementById("download-button");



    /* ---------------- SCENE ---------------- */

    const scene = new THREE.Scene();



    /* ---------------- CAMERA ---------------- */

    const camera = new THREE.OrthographicCamera(
        -radius,
        radius,
        radius,
        -radius,
        -10 * radius,
        10 * radius
    );

    camera.zoom = 1;

    camera.position.set(
        center[0] + radius,
        center[1] + radius,
        center[2] + radius
    );

    camera.up.set(0, 0, 1);
    camera.lookAt(...center);

    camera.updateProjectionMatrix();



    /* ---------------- RENDERER ---------------- */

    const renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        premultipliedAlpha: false
    });



    /* ---------------- GEOMETRY ---------------- */

    const geometry = new THREE.BufferGeometry();

    geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(new Float32Array(positions), 3)
    );

    geometry.setAttribute(
        "normal",
        new THREE.BufferAttribute(new Float32Array(normals), 3)
    );

    geometry.setIndex(faces);

    const material = new THREE.MeshNormalMaterial({
        side: THREE.DoubleSide
    });

    const surface = new THREE.Mesh(geometry, material);

    scene.add(surface);



    /* ---------------- CONTROLS ---------------- */

    const controls = new TrackballControls(camera, canvas);

    controls.target.set(...center);

    controls.noPan = true;
    controls.noZoom = true;
    controls.staticMoving = true;

    controls.addEventListener("start", mouseDown);
    controls.addEventListener("end", mouseUp);



    /* ---------------- RESIZE ---------------- */

    function resizeRenderer() {

        const pixelRatio = window.devicePixelRatio;

        const width = canvas.clientWidth * pixelRatio | 0;
        const height = canvas.clientHeight * pixelRatio | 0;

        if (canvas.width !== width || canvas.height !== height) {

            renderer.setSize(width, height, false);

            const size = Math.min(width, height);

            if (width > height) {

                renderer.setViewport((width - height) / 2, 0, size, size);

            } else {

                renderer.setViewport(0, (height - width) / 2, size, size);

            }

        }

    }



    /* ---------------- RENDER LOOP ---------------- */

    function animate() {

        requestAnimationFrame(animate);

        resizeRenderer();

        controls.update();

        renderer.render(scene, camera);

    }

    animate();



    /* ---------------- INTERACTION ---------------- */

    function mouseDown() {

        svg.innerHTML = "";
        downloadButton.style.visibility = "hidden";
        material.opacity = 1;

    }



    function mouseUp() {

        spinner.style.visibility = "visible";
        downloadButton.replaceWith(spinner);

        controls.enabled = false;

        camera.updateProjectionMatrix();



        let I = new THREE.Vector3(1, 0, -1).unproject(camera);
        let J = new THREE.Vector3(0, 1, -1).unproject(camera);
        let O = new THREE.Vector3(0, 0, -1).unproject(camera);



        let data = {

            I: I.sub(O).toArray(),
            J: J.sub(O).toArray(),
            O: O.toArray()

        };



        fetch("{% url 'surface-play' pk=pk %}", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(data)

        })

            .then(r => r.json())

            .then(drawSVG)

            .catch(console.error);

    }



    /* ---------------- SVG DRAWING ---------------- */

    function drawSVG(data) {

        const origin = data.origin;
        const lines = data.lines_by_visibility;

        const zoom = camera.zoom;

        const scaleX = zoom / radius;
        const scaleY = -zoom / radius;

        const transX = -zoom * origin[0] / radius;
        const transY = zoom * origin[1] / radius;

        svg.transform.baseVal.getItem(1).setScale(scaleX, scaleY);
        svg.transform.baseVal.getItem(0).setTranslate(transX, transY);



        let html = "";

        lines.forEach((group, i) => {

            group.forEach(line => {

                const visible = i === lines.length - 1;

                html += `
<polyline
points="${line}"
fill="none"
stroke="${visible ? 'black' : 'lightgrey'}"
stroke-width="1.5"
${visible ? '' : 'stroke-dasharray="4"'}
vector-effect="non-scaling-stroke"
/>`;

            });

        });

        svg.innerHTML = html;

        material.opacity = .2;

        controls.enabled = true;

        spinner.replaceWith(downloadButton);
        downloadButton.style.visibility = "visible";

        prepareDownload();

    }



    /* ---------------- SVG EXPORT ---------------- */

    function prepareDownload() {

        const clone = document.getElementById("svgbox").cloneNode(true);

        const svgDocType = document.implementation.createDocumentType(
            "svg",
            "-//W3C//DTD SVG 1.1//EN",
            "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"
        );

        const svgDoc = document.implementation.createDocument(
            "http://www.w3.org/2000/svg",
            "svg",
            svgDocType
        );

        svgDoc.replaceChild(clone, svgDoc.documentElement);

        const svgData = new XMLSerializer().serializeToString(svgDoc);

        const href =
            "data:image/svg+xml;charset=utf8," +
            encodeURIComponent(svgData);

        downloadButton.href = href;
        downloadButton.download = "{{ surface.name }}.svg";

    }

</script>

{% endblock %}
