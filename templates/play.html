{% extends "base.html" %}
{% load json_filter %}

{% block content %}
<div class="container-fluid d-flex flex-column vh-100">

    <div class="row justify-content-between p-3 titre">
        <h1>{{ surface.name }}</h1>
        <h1>
            <div id="spinner" class="spinner-border" style="visibility:hidden"></div>
            <a id="download-button" class="glyph" style="visibility:hidden">
                <span class="fa-regular fa-circle-down"></span>
            </a>
            <a href="{% url 'surface-update' pk=surface.pk %}" class="glyph">
                <span class="far fa-pen-to-square"></span>
            </a>
            <a href="{% url 'surfaces' %}" class="glyph">
                <span class="fa-regular fa-rectangle-list"></span>
            </a>
            <!-- domain toggle (debugging only)
            <a id="domain-toggle" class="glyph" style="cursor:pointer; opacity:0.3" title="Toggle domain view">
                <span class="fa-regular fa-map"></span>
            </a>
            -->
        </h1>
    </div>

    <div class="row flex-grow-1 position-relative">
        <canvas id="canvas" class="position-absolute w-100 h-100"></canvas>
        <svg id="svgbox" viewBox="-1 -1 2 2" preserveAspectRatio="xMidYMid meet" class="position-absolute w-100 h-100" style="overflow: visible; pointer-events:none">
            <g id="svg" transform="translate(0 0) scale(1 1)" style="pointer-events:none"></g>
        </svg>
        <!-- domain panel (debugging only)
        <div id="domain-panel" style="display:none; position:absolute; top:8px; right:8px; width:360px; height:360px; background:rgba(255,255,255,0.93); border:1px solid #bbb; border-radius:6px; overflow:hidden; z-index:10;">
            <svg id="domain-svg" width="100%" height="100%" style="cursor:grab">
                <g id="domain-g"></g>
            </svg>
        </div>
        -->
    </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
  }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

    /* ---------------- DATA ---------------- */
    const radius = {{ radius }};
    const center = {{ center | tojson }};
    const pk = {{ pk }};
    const positions = {{ positions | tojson }};
    const normals = {{ normals | tojson }};
    const faces = {{ faces | tojson }};

    /* ---------------- DOM ---------------- */
    const canvas = document.getElementById("canvas");
    const svg = document.getElementById("svg");
    const spinner = document.getElementById("spinner");
    const downloadButton = document.getElementById("download-button");

    /* ---------------- SCENE & LIGHTING ---------------- */
    const scene = new THREE.Scene();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    scene.add(sunLight);

    /* ---------------- CAMERA ---------------- */
    const camera = new THREE.OrthographicCamera(-radius, radius, radius, -radius, -10 * radius, 10 * radius);
    camera.zoom = 1;
    camera.position.set(center[0] + radius, center[1] + radius, center[2] + radius);
    camera.up.set(0, 0, 1);
    camera.lookAt(...center);
    camera.updateProjectionMatrix();

    /* ---------------- RENDERER ---------------- */
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x000000, 0);

    /* ---------------- GEOMETRY & MATERIAL ---------------- */
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.BufferAttribute(new Float32Array(positions), 3));
    geometry.setAttribute("normal", new THREE.BufferAttribute(new Float32Array(normals), 3));
    geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(faces), 1));

    // Random 3D vector
    const randomVec = () => ({
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        z: Math.random() * 2 - 1
    });

    // Helper to normalize a vector
    const normalize = (v) => {
        const mag = Math.sqrt(v.x**2 + v.y**2 + v.z**2);
        return { x: v.x / mag, y: v.y / mag, z: v.z / mag };
    }; 
    
    // Scalar product
    const dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z;

    // Two random orthogonal unit vectors
    const e1 = normalize(randomVec());
    var e2 = normalize(randomVec());
    e2 = normalize({
        x : e2.x - dot(e1,e2) * e1.x, 
        y : e2.y - dot(e1,e2) * e1.y, 
        z : e2.z - dot(e1,e2) * e1.z
    });

    // Calculate Vertex Colors from Normals

    const colors = new Float32Array(normals.length);

    // Version 1
    /*for (let i = 0; i < normals.length; i++) {
        colors[i] = normals[i] * 0.5 + 0.5; 
    }
    */

    // Version 2
    var i = 0;

    while (i + 2 < normals.length) {
        const normal = normalize({x : normals[i], y : normals[i + 1], z : normals[i + 2]});

        const nx = dot(normal, e1);
        const ny = dot(normal, e2);

    
        const color = new THREE.Color();

        // 1. Get the angle in the XY plane (abs value)
        const angle = Math.atan2(ny, nx);

        // 2. Map angle to Hue (0.0 to 1.0)
        const hue = .5 * angle/Math.PI + .5;

        // 3. Set HSL: (Hue, Saturation, Lightness)
        const lightness = .5;
        color.setHSL(hue, .9, lightness);

        colors[i] = color.r; 
        colors[i + 1] = color.g; 
        colors[i + 2] = color.b;
        
        i += 3
    }
    
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    // MeshPhongMaterial provides the "punchy" highlights for the active state
    const material = new THREE.MeshPhongMaterial({
        vertexColors: true,
        side: THREE.DoubleSide,
        shininess: 0.2,
        specular: 0x000000,
        transparent: false 
    });

    const surface = new THREE.Mesh(geometry, material);
    scene.add(surface);

    /* ---------------- CONTROLS ---------------- */
    const controls = new TrackballControls(camera, renderer.domElement);
    controls.target.set(...center);
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.staticMoving = true;
    controls.addEventListener("start", mouseDown);
    controls.addEventListener("end", mouseUp);

    /* ---------------- RESIZE ---------------- */
    function resizeRenderer() {
        const pixelRatio = window.devicePixelRatio;
        const width = canvas.clientWidth * pixelRatio | 0;
        const height = canvas.clientHeight * pixelRatio | 0;
        if (canvas.width !== width || canvas.height !== height) {
            renderer.setSize(width, height, false);
            const size = Math.min(width, height);
            if (width > height) {
                renderer.setViewport((width - height) / 2, 0, size, size);
            } else {
                renderer.setViewport(0, (height - width) / 2, size, size);
            }
        }
    }

    /* ---------------- RENDER LOOP ---------------- */
    function animate() {
        requestAnimationFrame(animate);
        resizeRenderer();
        controls.update();
        sunLight.position.copy(camera.position); // Always lit from camera POV
        renderer.render(scene, camera);
    }
    animate();

    /* ---------------- INTERACTION ---------------- */
    function mouseDown() {
        svg.innerHTML = "";
        downloadButton.style.visibility = "hidden";

        // ACTIVE STATE: Saturated, shiny, and bright
        material.emissive.setHex(0x000000);
        material.emissiveIntensity = 0;
        material.shininess = 80;
        material.specular.setHex(0x444444);
        ambientLight.intensity = 0.8;
    }

    function mouseUp() {
        spinner.style.visibility = "visible";
        downloadButton.replaceWith(spinner);
        controls.enabled = false;

        let I = new THREE.Vector3(1, 0, -1).unproject(camera);
        let J = new THREE.Vector3(0, 1, -1).unproject(camera);
        let O = new THREE.Vector3(0, 0, -1).unproject(camera);

        let data = {
            I: I.sub(O).toArray(),
            J: J.sub(O).toArray(),
            O: O.toArray()
        };

        fetch("{% url 'surface-play' pk=pk %}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(drawSVG)
        .catch(console.error);
    }

    /* ---------------- SVG DRAWING ---------------- */
    function drawSVG(data) {
        const origin = data.origin;
        const lines = data.lines_by_visibility;
        const zoom = camera.zoom;

        const scaleX = zoom / radius;
        const scaleY = -zoom / radius;
        const transX = -zoom * origin[0] / radius;
        const transY = zoom * origin[1] / radius;

        svg.transform.baseVal.getItem(1).setScale(scaleX, scaleY);
        svg.transform.baseVal.getItem(0).setTranslate(transX, transY);

        let html = "";
        lines.forEach((group, i) => {
            group.forEach(line => {
                const visible = i === lines.length - 1;
                html += `
                <polyline
                    points="${line}"
                    fill="none"
                    stroke="${visible ? 'black' : 'grey'}"
                    stroke-width="1.5"
                    ${visible ? '' : 'stroke-dasharray="4"'}
                    vector-effect="non-scaling-stroke"
                />`;
            });
        });

        svg.innerHTML = html;

        // PASTEL STATE: Bleach colors with white light, remove shine
        material.emissive.setHex(0xffffff);
        material.emissiveIntensity = 0.5; 
        material.shininess = 0;
        material.specular.setHex(0x000000);
        ambientLight.intensity = 0.4; // Dim environment to emphasize SVG

        controls.enabled = true;
        spinner.replaceWith(downloadButton);
        downloadButton.style.visibility = "visible";
        prepareDownload();
        // if (data.domain) updateDomain(data.domain);
    }

    /* ---------------- SVG EXPORT ---------------- */
    function prepareDownload() {
        const clone = document.getElementById("svgbox").cloneNode(true);
        const svgDocType = document.implementation.createDocumentType("svg", "-//W3C//DTD SVG 1.1//EN", "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd");
        const svgDoc = document.implementation.createDocument("http://www.w3.org/2000/svg", "svg", svgDocType);
        svgDoc.replaceChild(clone, svgDoc.documentElement);
        const svgData = new XMLSerializer().serializeToString(svgDoc);
        const href = "data:image/svg+xml;charset=utf8," + encodeURIComponent(svgData);
        downloadButton.href = href;
        downloadButton.download = "{{ surface.name }}.svg";
    }

    /* ---------------- DOMAIN PANEL (debugging only — uncomment to enable) ----------------
    const domainPanel = document.getElementById("domain-panel");
    const domainSvg = document.getElementById("domain-svg");
    const domainG = document.getElementById("domain-g");
    const domainToggle = document.getElementById("domain-toggle");

    let domainData = null;

    // Pan/zoom state
    let dpTx = 0, dpTy = 0, dpScale = 1;
    let dpDragging = false, dpDx = 0, dpDy = 0;

    domainToggle.addEventListener("click", () => {
        if (domainPanel.style.display === "none") {
            domainPanel.style.display = "block";
            domainToggle.style.opacity = "1";
            if (domainData) renderDomain();
        } else {
            domainPanel.style.display = "none";
            domainToggle.style.opacity = "0.3";
        }
    });

    domainSvg.addEventListener("wheel", e => {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
        const rect = domainSvg.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        dpTx = mx + factor * (dpTx - mx);
        dpTy = my + factor * (dpTy - my);
        dpScale *= factor;
        applyDomainTransform();
    }, {passive: false});

    domainSvg.addEventListener("mousedown", e => {
        dpDragging = true;
        dpDx = e.clientX - dpTx;
        dpDy = e.clientY - dpTy;
        domainSvg.style.cursor = "grabbing";
    });
    window.addEventListener("mousemove", e => {
        if (!dpDragging) return;
        dpTx = e.clientX - dpDx;
        dpTy = e.clientY - dpDy;
        applyDomainTransform();
    });
    window.addEventListener("mouseup", () => {
        dpDragging = false;
        domainSvg.style.cursor = "grab";
    });

    function applyDomainTransform() {
        domainG.setAttribute("transform", `translate(${dpTx},${dpTy}) scale(${dpScale})`);
        const inv = 1 / dpScale;
        for (const el of domainG.querySelectorAll("[data-base-fs]"))
            el.setAttribute("font-size", (parseFloat(el.dataset.baseFs) * inv).toFixed(2));
        for (const el of domainG.querySelectorAll("[data-base-r]"))
            el.setAttribute("r", (parseFloat(el.dataset.baseR) * inv).toFixed(2));
    }

    function renderDomain() {
        if (!domainData) return;
        const d = domainData;
        const W = domainSvg.clientWidth || 360;
        const H = domainSvg.clientHeight || 360;
        const pad = 24;
        const [uMin, uMax, vMin, vMax] = d.bounds;
        const du = uMax - uMin, dv = vMax - vMin;
        const sx = (W - 2*pad) / du;
        const sy = (H - 2*pad) / dv;

        // Map domain coords to SVG pixel coords
        const px = u => pad + (u - uMin) * sx;
        const py = v => H - pad - (v - vMin) * sy;

        // Reset transform
        dpTx = 0; dpTy = 0; dpScale = 1;
        applyDomainTransform();

        let html = "";

        // Triangle grid
        if (d.res) {
            const res = d.res;
            const us = Array.from({length: res+1}, (_, i) => uMin + i * du / res);
            const vs = Array.from({length: res+1}, (_, j) => vMin + j * dv / res);
            // Horizontal lines
            for (let j = 0; j <= res; j++) {
                html += `<line x1="${px(us[0])}" y1="${py(vs[j])}" x2="${px(us[res])}" y2="${py(vs[j])}" stroke="#ddd" stroke-width="0.4" vector-effect="non-scaling-stroke"/>`;
            }
            // Vertical lines
            for (let i = 0; i <= res; i++) {
                html += `<line x1="${px(us[i])}" y1="${py(vs[0])}" x2="${px(us[i])}" y2="${py(vs[res])}" stroke="#ddd" stroke-width="0.4" vector-effect="non-scaling-stroke"/>`;
            }
            // Diagonals (bottom-left to top-right) — only at moderate resolution
            if (res <= 80) {
                for (let i = 0; i < res; i++) {
                    for (let j = 0; j < res; j++) {
                        html += `<line x1="${px(us[i])}" y1="${py(vs[j])}" x2="${px(us[i+1])}" y2="${py(vs[j+1])}" stroke="#ddd" stroke-width="0.4" vector-effect="non-scaling-stroke"/>`;
                    }
                }
            }
        }

        // Lines
        const typeColor = {"contour": "red", "border": "#3399ff", "??": "#aaa"};
        for (const line of d.lines) {
            const col = typeColor[line.type] || "#aaa";
            // Draw the polyline
            if (line.pts && line.pts.length > 0) {
                const points = line.pts.map(p => `${px(p[0])},${py(p[1])}`).join(" ");
                html += `<polyline points="${points}" fill="none" stroke="${col}" stroke-width="1.2" vector-effect="non-scaling-stroke"/>`;
            }
            // Breakpoints
            for (const bk of (line.bks || [])) {
                const bx = px(bk.pt[0]), by = py(bk.pt[1]);
                html += `<circle cx="${bx}" cy="${by}" r="3" fill="orange" stroke="none" data-base-r="3"/>`;
                html += `<text x="${bx+4}" y="${by-3}" font-size="8" fill="orange" data-base-fs="8">${bk.v}</text>`;
            }
        }

        // Cusps (magenta stars)
        for (const cp of (d.cusps || [])) {
            const cx = px(cp[0]), cy = py(cp[1]);
            html += `<text x="${cx}" y="${cy}" font-size="12" fill="magenta" text-anchor="middle" dominant-baseline="middle" data-base-fs="12">★</text>`;
        }

        domainG.innerHTML = html;
    }

    // Called from drawSVG when data arrives
    function updateDomain(d) {
        domainData = d;
        if (domainPanel.style.display !== "none") renderDomain();
    }
    ---------------- END DOMAIN PANEL ---------------- */
</script>
{% endblock %}
